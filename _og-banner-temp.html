<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .banner {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #1f4a35 0%, #2a6b4a 55%, #3f8f68 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 90px;
  }
  .badge {
    width: 84px;
    height: 84px;
    border-radius: 20px;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    font-weight: 800;
    color: #ffffff;
    margin-bottom: 36px;
  }
  h1 {
    color: #ffffff;
    font-size: 66px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 18px;
  }
  h2 {
    color: rgba(255,255,255,0.88);
    font-size: 30px;
    font-weight: 500;
    margin-bottom: 34px;
  }
  .tags {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .tag {
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.3);
    color: #ffffff;
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 20px;
    font-weight: 600;
  }
  .corner {
    position: absolute;
    right: -80px;
    top: -80px;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .corner2 {
    position: absolute;
    right: 60px;
    bottom: -120px;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="corner"></div>
    <div class="corner2"></div>
    <div class="badge">H</div>
    <h1>Hang T. M. Nguyen</h1>
    <h2>Data Analyst — Analytics, Anomaly Detection &amp; Data Consulting</h2>
    <div class="tags">
      <span class="tag">Machine Learning</span>
      <span class="tag">Data Governance</span>
      <span class="tag">Power BI / Tableau</span>
    </div>
  </div>
</body>
</html>
